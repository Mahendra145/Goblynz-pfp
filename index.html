<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goblynz PFP Generator</title>
    <style>
        :root {
            --bg-dark: #0f1118;
            --bg-mid: #161a25;
            --panel: rgba(255, 255, 255, 0.08);
            --panel-border: rgba(255, 255, 255, 0.18);
            --text: #f2f5ff;
            --muted: #b9c2d9;
            --accent: #48e8a7;
            --accent-2: #37b9ff;
            --danger: #ff5a6e;
            --shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 20%, rgba(55, 185, 255, 0.18), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(72, 232, 167, 0.18), transparent 38%),
                linear-gradient(145deg, var(--bg-dark), var(--bg-mid));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
            background-size: 34px 34px;
            animation: gridDrift 42s linear infinite;
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridDrift {
            from {
                background-position: 0 0, 0 0;
            }
            to {
                background-position: 34px 20px, 20px 34px;
            }
        }

        body > * {
            position: relative;
            z-index: 1;
        }
    
        .main-heading {
            font-size: clamp(34px, 5vw, 54px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            margin-top: 0;
            background: linear-gradient(to right, #9fe85b, #00d28a, #37b9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 6px 16px rgba(55, 185, 255, 0.28));
        }

        .subtitle {
            margin: 0 0 26px;
            color: var(--muted);
            font-size: 15px;
            letter-spacing: 0.2px;
        }

        .generator-container {
            display: grid;
            grid-template-columns: auto auto auto;
            align-items: center;
            gap: 26px;
            background: var(--panel);
            padding: 28px;
            border-radius: 26px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            max-width: 980px;
            width: 100%;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
            justify-content: center;
        }

        .canvas-column {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        .avatar-display {
            width: min(68vw, 420px);
            aspect-ratio: 1 / 1;
            position: relative;
            background: linear-gradient(145deg, #111525, #0a0d17);
            border-radius: 20px;
            box-shadow: inset 0 4px 14px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .avatar-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.22s ease-in-out;
            will-change: opacity;
        }

        button {
            border: none;
            outline: none;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        button:focus-visible {
            box-shadow: 0 0 0 3px rgba(55, 185, 255, 0.45);
        }

        .control-btn {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(145deg, #9ee45f, #6cc63a);
            color: #12200c;
            box-shadow: 0 8px 0 #4e9128, 0 14px 16px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2px;
            font-weight: 800;
            font-size: 24px;
        }

        .control-btn span {
            font-size: 11px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            line-height: 1;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.03);
        }

        .control-btn:active {
            transform: translateY(7px);
            box-shadow: 0 1px 0 #4e9128, 0 6px 10px rgba(0, 0, 0, 0.22);
        }

        .action-btn {
            width: 96px;
            height: 96px;
            background: linear-gradient(145deg, #ff6f87, #ff4d4d);
            color: white;
            box-shadow: 0 8px 0 #c5304e, 0 14px 16px rgba(0, 0, 0, 0.28);
        }

        .action-btn:active {
            box-shadow: 0 1px 0 #c5304e, 0 6px 10px rgba(0, 0, 0, 0.22);
        }

        .download-btn {
            min-width: 240px;
            height: 56px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #0d1322;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 22px rgba(54, 193, 209, 0.36);
            padding: 0 26px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
        }

        .download-btn:active {
            transform: translateY(1px);
            box-shadow: 0 5px 12px rgba(54, 193, 209, 0.28);
        }

        @media (max-width: 860px) {
            body {
                padding: 16px;
            }

            .generator-container {
                grid-template-columns: 1fr;
                justify-items: center;
                gap: 18px;
                padding: 20px;
            }

            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }

            .control-btn {
                width: 82px;
                height: 82px;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 12px;
                justify-content: flex-start;
            }

            .main-heading {
                margin-top: 10px;
                margin-bottom: 8px;
                letter-spacing: 1px;
                text-align: center;
            }

            .subtitle {
                margin-bottom: 14px;
                text-align: center;
            }

            .generator-container {
                padding: 14px;
                gap: 14px;
                border-radius: 18px;
                backdrop-filter: blur(8px);
            }

            .canvas-column {
                width: 100%;
                gap: 14px;
            }

            .avatar-display {
                width: min(90vw, 360px);
                border-radius: 14px;
            }

            .sidebar {
                gap: 10px;
            }

            .control-btn {
                width: 74px;
                height: 74px;
                box-shadow: 0 6px 0 #4e9128, 0 10px 12px rgba(0, 0, 0, 0.23);
                font-size: 20px;
            }

            .control-btn span {
                font-size: 10px;
            }

            .action-btn {
                width: 86px;
                height: 86px;
            }

            .download-btn {
                width: 100%;
                min-width: 0;
                height: 52px;
                font-size: 15px;
                padding: 0 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            body::before {
                animation: none;
            }

            .avatar-layer,
            button,
            .control-btn:hover,
            .download-btn:hover {
                transition: none !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>

<h1 class="main-heading">Goblynz PFP Factory</h1>
    <p class="subtitle">Build your goblin look in one tap.</p>
<div class="generator-container">
    <div class="sidebar">
        <button class="control-btn action-btn" onclick="randomizeAll()" aria-label="Randomize all traits">🎲<span>Random</span></button>
    </div>
    <div class="canvas-column">

    <div class="avatar-display" aria-live="polite" aria-label="Goblyn avatar preview">
        <img src="backgrounds/empty4.png" class="avatar-layer" id="bg-layer" alt="Background">
        <img src="base/goblin.png" class="avatar-layer" id="body-layer" alt="Base Body">
        <img src="clothes/empty1.png" class="avatar-layer" id="clothes-layer" alt="Clothes">
        <img src="hats/empty3.png" class="avatar-layer" id="hat-layer" alt="Hat">
        <img src="eyes/empty2.png" class="avatar-layer" id="eyes-layer" alt="Eyes">
    </div>
    
         <button class="download-btn" onclick="downloadAvatar()" aria-label="Download your profile picture">Download PFP 📥</button>
        
    </div>

    <div class="sidebar">
        <button class="control-btn" onclick="cycleItem('bg')" aria-label="Change background">🌲<span>BG</span></button>
        <button class="control-btn" onclick="cycleItem('eyes')" aria-label="Change eyes">👀<span>Eyes</span></button>
        <button class="control-btn" onclick="cycleItem('clothes')" aria-label="Change clothes">👕<span>Clothes</span></button>
        <button class="control-btn" onclick="cycleItem('hat')" aria-label="Change hat">🧢<span>Hat</span></button>
    </div>
</div>

<script>
    // This tells the code how many images you have in each folder
    const assets = {
        bg: ['backgrounds/bg1.png', 'backgrounds/bg2.png', 'backgrounds/empty4.png'], 
        eyes: ['eyes/eye1.png', 'eyes/eye2.png', 'eyes/eye3.png', 'eyes/eye4.png', 'eyes/empty2.png'],
        clothes: ['clothes/shirt1.png', 'clothes/shirt2.png', 'clothes/shirt3.png', 'clothes/shirt4.png', 'clothes/empty1.png'],
        hat: ['hats/hat1.png', 'hats/hat2.png', 'hats/hat3.png', 'hats/hat4.png', 'hats/hat5.png', 'hats/empty3.png']
    };

    // This tracks which item is currently showing
    const currentIndex = {
        bg: 0,
        eyes: 0,
        clothes: 0,
        hat: 0
    };

    let audioCtx = null;
    const layerTransitionMs = 120;
    const pendingLayerTimeout = {};

    function playClickSound(type = 'soft') {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            const profile = {
                soft: { freq: 420, wave: 'triangle', attack: 0.004, release: 0.08, vol: 0.05 },
                random: { freq: 520, wave: 'square', attack: 0.004, release: 0.1, vol: 0.06 },
                download: { freq: 640, wave: 'sine', attack: 0.005, release: 0.14, vol: 0.07 }
            }[type] || { freq: 420, wave: 'triangle', attack: 0.004, release: 0.08, vol: 0.05 };

            osc.type = profile.wave;
            osc.frequency.setValueAtTime(profile.freq, now);
            osc.frequency.exponentialRampToValueAtTime(profile.freq * 0.85, now + profile.release);

            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(profile.vol, now + profile.attack);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + profile.release);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + profile.release + 0.02);
        } catch (error) {
            console.error('Audio feedback unavailable:', error);
        }
    }

    function updateLayer(category, index) {
        const layer = document.getElementById(category + '-layer');
        if (!layer) return;

        if (pendingLayerTimeout[category]) {
            clearTimeout(pendingLayerTimeout[category]);
        }

        const nextSrc = assets[category][index];
        if (layer.getAttribute('src') === nextSrc) {
            layer.style.opacity = '1';
            return;
        }

        layer.style.opacity = '0';
        pendingLayerTimeout[category] = setTimeout(() => {
            layer.src = nextSrc;
            pendingLayerTimeout[category] = null;
        }, layerTransitionMs);

        const reveal = () => {
            layer.style.opacity = '1';
        };

        layer.onload = reveal;
        layer.onerror = reveal;

        if (layer.complete && layer.naturalWidth > 0) {
            reveal();
        }
    }

    // The function that runs when you click a button
    function cycleItem(category) {
        currentIndex[category] = (currentIndex[category] + 1) % assets[category].length;
        updateLayer(category, currentIndex[category]);
        playClickSound('soft');
    }

   // The randomizer function
    function randomizeAll() {
        for (const category in assets) {
            // We add "- 1" so the randomizer ignores the last item (the empty PNG)
            const randomNum = Math.floor(Math.random() * (assets[category].length - 1));
            currentIndex[category] = randomNum;
            updateLayer(category, randomNum);
        }
        playClickSound('random');
    }

    // The Download function
    function downloadAvatar() {
        playClickSound('download');

        // Create an invisible canvas the same size as your art
        const canvas = document.createElement('canvas');
        canvas.width = 1000;
        canvas.height = 1000;
        const ctx = canvas.getContext('2d');

        // Grab all the current image layers in order from bottom to top
        const layers = [
            document.getElementById('bg-layer'),
            document.getElementById('body-layer'),
            document.getElementById('clothes-layer'),
            document.getElementById('hat-layer'),
            document.getElementById('eyes-layer')
        ];

        // Draw each image onto the canvas
        layers.forEach(img => {
            ctx.drawImage(img, 0, 0, 1000, 1000);
        });

        // Convert the canvas to a PNG and trigger the download
        const link = document.createElement('a');
        link.download = 'My_Goblynz.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

</script>

</body>
</html>
